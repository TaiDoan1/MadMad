<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADMAD Studio Backend API</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container {
            border: 1px solid #1a1a1a;
            padding: 50px 40px;
            border-radius: 24px;
            max-width: 420px;
            background: linear-gradient(145deg, #0a0a0a, #030303);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333, transparent);
        }
        h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 6px;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            color: #fff;
        }
        p {
            font-size: 11px;
            color: #555;
            margin: 0 0 30px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #0d0d0d;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            border: 1px solid #161616;
            text-transform: uppercase;
            color: #a3a3a3;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MADMAD STUDIO</h1>
        <p>NOIR BACKEND API SERVERLESS</p>
        <div class="status">
            <span class="dot"></span>
            <span>SYSTEM RUNNING HEALTHY</span>
        </div>
    </div>
</body>
</html>
