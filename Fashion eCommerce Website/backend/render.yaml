services:
  # 🚀 Dịch vụ Web Service cho Backend API
  - type: web
    name: madmad-backend
    env: node
    plan: free # Sử dụng gói Free miễn phí của Render
    rootDir: Fashion eCommerce Website/backend # Đường dẫn tương đối từ root của Git repo
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: madmad-db
          property: connectionString

databases:
  # 🐘 Cơ sở dữ liệu PostgreSQL cho môi trường Production
  - name: madmad-db
    plan: free
    ipAllowList: [] # Cho phép mọi IP truy cập kết nối an toàn từ Render
